<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חידון קליקרים - מסך חי</title>
<link rel="stylesheet" href="/css/dashboard.css">
<style>
  /* CSS קריטי מוטבע - לא תלוי בקובץ dashboard.css החיצוני, כדי שמסך ההתחברות
     תמיד יעבוד גם אם ה-CSS החיצוני עוד לא מכיר את ה-class-ים האלה */
  .login-overlay {
    position: fixed;
    inset: 0;
    z-index: 5000;
    background: rgba(5,5,10,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-panel {
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 36px 40px;
    min-width: 300px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    direction: rtl;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .login-title { color: #fff; font-size: 20px; text-align: center; margin: 0 0 6px; }
  .login-input {
    background: #2a2a38;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    padding: 12px 14px;
    font-size: 15px;
    direction: rtl;
  }
  .login-error { color: #ff6b6b; font-size: 13px; text-align: center; min-height: 16px; }
</style>
</head>
<body>

<div class="stage-root">

  <!-- מסך התחברות - מכסה הכל עד שמזינים סיסמה תקפה -->
  <div class="login-overlay" id="loginOverlay" hidden>
    <form class="login-panel" id="loginForm">
      <h2 class="login-title">🔒 כניסה לניהול</h2>
      <input type="password" id="loginPassword" class="login-input" placeholder="סיסמה" required autofocus>
      <button type="submit" class="btn-mini btn-block">כניסה</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>

  <!-- אייקון פתיחת סרגל ניהול - עדין, לא בולט לקהל -->
  <button class="admin-toggle" id="adminToggle" title="ניהול">⚙</button>

  <!-- סרגל ניהול נשלף (drawer) - סגור כברירת מחדל -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <span>🎛️ ניהול <span id="activeGameName" class="muted"></span></span>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>

    <nav class="drawer-nav">
      <button class="nav-btn active" data-panel="questions">📋 ניהול שאלות</button>
      <button class="nav-btn" data-panel="users">👤 ניהול משתמשים</button>
      <button class="nav-btn" data-panel="scores">🏆 ניקוד חי</button>
      <button class="nav-btn" data-panel="connections">📡 מחוברים כרגע</button>
      <button class="nav-btn" data-panel="games" id="gamesNavBtn" hidden>🗂️ ניהול משחקים</button>
    </nav>

    <div class="drawer-body">

      <!-- ניהול שאלות -->
      <section class="panel" id="panel-questions">
        <div id="qlist"></div>

        <form class="addq" id="addForm">
          <label>טקסט השאלה</label>
          <input type="text" id="qText" required placeholder="לדוגמה: מה בירת ישראל?">

          <label>כמות אפשרויות</label>
          <select id="optCount">
            <option value="2">2</option><option value="3">3</option>
            <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
          </select>

          <div id="optionsWrap"></div>

          <label>זמן מענה (שניות)</label>
          <input type="number" id="qSeconds" value="15" min="3" max="120">

          <button type="submit" class="btn-mini btn-block">➕ הוספת שאלה</button>
        </form>
      </section>

      <!-- ניהול משתמשים - כינויים + מחיקה + הוספה ידנית -->
      <section class="panel" id="panel-users" hidden>
        <form class="addq" id="addPlayerForm">
          <label>הוספת שחקן ידנית (טרם התקשר)</label>
          <input type="tel" id="newPlayerPhone" required placeholder="מספר טלפון">
          <input type="text" id="newPlayerName" required placeholder="כינוי">
          <button type="submit" class="btn-mini btn-block">➕ הוספת שחקן</button>
        </form>

        <table class="data-table" id="usersTable">
          <thead><tr><th>טלפון</th><th>כינוי</th><th></th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- ניקוד חי -->
      <section class="panel" id="panel-scores" hidden>
        <h3>לפי ניקוד</h3>
        <table class="data-table" id="scoresTable">
          <thead><tr><th>#</th><th>שם</th><th>ניקוד</th><th>סטטוס</th></tr></thead>
          <tbody></tbody>
        </table>

        <h3>לפי מהירות (זמן ממוצע לתשובה נכונה)</h3>
        <table class="data-table" id="speedTable">
          <thead><tr><th>#</th><th>שם</th><th>זמן ממוצע</th><th>תשובות נכונות</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- מחוברים כרגע -->
      <section class="panel" id="panel-connections" hidden>
        <table class="data-table" id="connectionsTable">
          <thead><tr><th>שם</th><th>טלפון</th><th>מחובר מאז</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- ניהול משחקים - רק לסיסמת-על -->
      <section class="panel" id="panel-games" hidden>
        <table class="data-table" id="gamesTable">
          <thead><tr><th>משחק</th><th></th><th></th></tr></thead>
          <tbody></tbody>
        </table>

        <form class="addq" id="newGameForm" style="margin-top:14px;">
          <label>שם משחק חדש</label>
          <input type="text" id="newGameName" required placeholder="לדוגמה: פורים 2026">

          <label>סיסמה למשחק</label>
          <input type="text" id="newGamePassword" required placeholder="סיסמה שהמפעיל יזין">

          <button type="submit" class="btn-mini btn-block">➕ צור משחק</button>
        </form>
      </section>

    </div>

    <div class="drawer-footer">
      <button class="btn-mini btn-block" id="logoutBtn">🚪 התנתקות</button>
    </div>
  </aside>
  <div class="drawer-overlay" id="drawerOverlay" hidden></div>

  <!-- ===== מסך ראשי מוקרן ===== -->
  <main class="live-screen">

    <div class="live-header">
      <div class="counter-badge"><span id="connectedCount">0</span> מחוברים</div>
      <span class="conn-dot off" id="connDot"></span>
    </div>

    <div class="question-stage" id="questionStage">

      <div class="idle-state" id="idleState">ממתינים לשאלה הבאה...</div>

      <div class="question-live" id="questionLive" hidden>
        <div class="timer-wrap">
          <svg class="timer-ring" viewBox="0 0 120 120">
            <circle class="timer-ring-bg" cx="60" cy="60" r="54"></circle>
            <circle class="timer-ring-fg" id="timerRing" cx="60" cy="60" r="54"></circle>
          </svg>
          <div class="timer-num" id="timerNum">10</div>
        </div>
        <h2 class="q-text" id="liveQText"></h2>
        <div class="q-options" id="liveQOptions"></div>
      </div>

      <div class="question-results" id="questionResults" hidden>
        <h2 class="q-text" id="resultsQText"></h2>
        <div class="results-bars" id="resultsBars"></div>
      </div>

    </div>

    <!-- טוסטים - הבזק שם כשעונים, בלי לחשוף מה נבחר -->
    <div class="toast-stack" id="toastStack"></div>

    <!-- כפתור בולט - חשיפת 3 מובילים -->
    <button class="btn-top3" id="top3Btn">🏆 הצג 3 מובילים</button>
    <div class="top3-overlay" id="top3Overlay" hidden>
      <div class="top3-panel" id="top3Panel"></div>
    </div>

    <!-- מסך תוצאות סופיות - עולה אוטומטית בסיום משחק (רצף אוטומטי או "סיים משחק") -->
    <div class="final-overlay" id="finalOverlay" hidden>
      <div class="final-panel">
        <div class="final-badge">🏁 המשחק הסתיים</div>
        <h2 class="top3-title">התוצאות הסופיות</h2>
        <div id="finalTop3"></div>

        <button class="btn-mini" id="toggleFullResults">📋 הצג טבלה מלאה</button>
        <table class="data-table final-full-table" id="finalFullTable" hidden>
          <thead><tr><th>#</th><th>כינוי</th><th>ניקוד</th><th>תשובות נכונות</th><th>זמן ממוצע</th></tr></thead>
          <tbody></tbody>
        </table>

        <button class="btn-mini btn-block" id="closeFinalOverlay">✕ סגירה</button>
      </div>
    </div>

    <!-- כפתורי שליטה קטנים למנהל, גלויים אך לא בולטים -->
    <div class="control-bar">
      <button class="btn-mini" id="startBtn">▶ התחל</button>
      <button class="btn-mini" id="pauseBtn" hidden>⏸ השהה</button>
      <button class="btn-mini" id="closeBtn" hidden>⏹ סגור</button>
      <button class="btn-mini" id="endGameBtn">🏁 סיים משחק</button>
    </div>

  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
