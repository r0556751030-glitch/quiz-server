<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>כניסת מנהל מערכת</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "Segoe UI", Assistant, Arial, sans-serif;
    background: #0b0716; color: #f3eefe;
  }
  .panel {
    background: #130c28; border: 1px solid rgba(245,158,11,0.3); border-radius: 18px;
    padding: 36px 34px; width: 320px; display: flex; flex-direction: column; gap: 14px;
  }
  h2 { margin: 0 0 4px; text-align: center; font-size: 19px; }
  input {
    background: #1a1233; border: 1px solid rgba(255,255,255,0.16); border-radius: 9px;
    color: #f3eefe; padding: 12px 14px; font-size: 15px; direction: rtl;
  }
  button {
    background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1233; border: none;
    border-radius: 9px; padding: 12px; font-weight: 800; font-size: 15px; cursor: pointer;
  }
  .err { color: #ff8686; font-size: 13px; text-align: center; min-height: 16px; }
  .back { text-align: center; font-size: 12.5px; color: #c4b8e8; cursor: pointer; }
</style>
</head>
<body>
  <form class="panel" id="form">
    <h2>🔐 כניסת מנהל מערכת</h2>
    <input type="password" id="password" placeholder="סיסמת-על" required autofocus>
    <button type="submit">כניסה</button>
    <div class="err" id="err"></div>
    <div class="back" onclick="location.href='/'">חזרה לעמוד הבית</div>
  </form>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error || 'שגיאה'; return; }
  location.href = '/games.html';
});
</script>
</body>
</html>
