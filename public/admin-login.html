<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>כניסת מנהל מערכת</title>
<link rel="stylesheet" href="./css/admin-login.css">
</head>
<body>
  <form class="panel" id="form">
    <h2>🔐 כניסת מנהל מערכת</h2>
    <input type="password" id="password" placeholder="סיסמת-על" required autofocus>
    <button type="submit">כניסה</button>
    <div class="err" id="err"></div>
    <div class="back" onclick="location.href='/'">חזרה לעמוד הבית</div>
  </form>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error || 'שגיאה'; return; }
  location.href = '/games.html';
});
</script>
</body>
</html>
